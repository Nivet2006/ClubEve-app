name: Build & Release

on:
  push:
    branches:
      - master

jobs:
  build-and-release:
    name: Build signed APK and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed to count commits for version

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── 4. Compute version from commit count ───────────────────────────────
      - name: Compute version
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COUNT}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "Version: $VERSION  Tag: $TAG"

      # ── 5. Write local.properties from secrets ─────────────────────────────
      - name: Write local.properties
        run: |
          cat > local.properties <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GITHUB_OWNER=${{ secrets.APP_GITHUB_OWNER }}
          GITHUB_REPO=${{ secrets.APP_GITHUB_REPO }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN_VALUE }}
          EOF

      # ── 6. Decode keystore ─────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore
          echo "Keystore size: $(wc -c < ${{ github.workspace }}/release.keystore) bytes"

      # ── 7. Build signed release APK ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease -PappVersion=${{ steps.version.outputs.version }}
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 8. Rename APK ──────────────────────────────────────────────────────
      - name: Rename APK
        id: rename_apk
        run: |
          echo "=== APKs found ==="
          find app/build/outputs/apk -name "*.apk"
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_SRC" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          TAG="${{ steps.version.outputs.tag }}"
          DEST="app/build/outputs/apk/release/ClubEve-CC-${TAG}.apk"
          mv "$APK_SRC" "$DEST"
          echo "apk_path=$DEST" >> $GITHUB_OUTPUT
          echo "APK ready: $DEST"

      # ── 9. Tag the commit ──────────────────────────────────────────────────
      - name: Create git tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      # ── 10. Create GitHub Release and upload APK ───────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ClubEve CC ${{ steps.version.outputs.tag }}"
          body: |
            ## ClubEve CC ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `ClubEve-CC-${{ steps.version.outputs.tag }}.apk` below
            2. Enable **Install from unknown sources** on your device
            3. Open the APK to install
          files: ${{ steps.rename_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
