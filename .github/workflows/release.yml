name: Build & Release

# Triggers on every push; only creates a GitHub Release when a v* tag is pushed
on:
  push:

jobs:
  build-and-release:
    name: Build signed APK and publish release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── 4. Write local.properties from secrets ─────────────────────────────
      - name: Write local.properties
        run: |
          cat > local.properties <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GITHUB_OWNER=${{ secrets.APP_GITHUB_OWNER }}
          GITHUB_REPO=${{ secrets.APP_GITHUB_REPO }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN_VALUE }}
          EOF

      # ── 5. Decode keystore ─────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore
          echo "Keystore size: $(wc -c < ${{ github.workspace }}/release.keystore) bytes"

      # ── 6. Build signed release APK ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 7. Rename APK ──────────────────────────────────────────────────────
      - name: Rename APK
        id: rename_apk
        run: |
          echo "=== All APKs built ==="
          find app/build/outputs/apk -name "*.apk"
          VERSION="${{ github.ref_name }}"
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_SRC" ]; then
            echo "ERROR: No APK found in release folder!"
            exit 1
          fi
          DEST="app/build/outputs/apk/release/ClubEve-CC-${VERSION}.apk"
          mv "$APK_SRC" "$DEST"
          echo "apk_path=$DEST" >> $GITHUB_OUTPUT
          echo "Renamed to: $DEST"

      # ── 8. Create GitHub Release and upload APK (only on v* tags) ──────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ClubEve CC ${{ github.ref_name }}"
          body: |
            ## ClubEve CC ${{ github.ref_name }}

            ### Installation
            1. Download `ClubEve-CC-${{ github.ref_name }}.apk` below
            2. Enable **Install from unknown sources** on your device
            3. Open the APK to install
          files: ${{ steps.rename_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
