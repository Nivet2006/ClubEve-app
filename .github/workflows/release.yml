name: Build & Release

# Triggers on every push; only creates a GitHub Release when a v* tag is pushed
on:
  push:

jobs:
  build-and-release:
    name: Build signed APK and publish release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── 4. Write local.properties from secrets ─────────────────────────────
      #
      # Add these secrets in:
      #   GitHub repo → Settings → Secrets and variables → Actions
      #
      #   SUPABASE_URL        — your Supabase project URL
      #   SUPABASE_ANON_KEY   — your Supabase anon key
      #   APP_GITHUB_OWNER    — your GitHub username / org (e.g. "acme-corp")
      #   APP_GITHUB_REPO     — this repo name (e.g. "clubeve-cc")
      #   GITHUB_TOKEN_VALUE  — a fine-grained PAT with "Contents: read" scope
      #                         (named TOKEN_VALUE to avoid clash with the
      #                          built-in GITHUB_TOKEN)
      #
      - name: Write local.properties
        run: |
          cat > local.properties <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GITHUB_OWNER=${{ secrets.APP_GITHUB_OWNER }}
          GITHUB_REPO=${{ secrets.APP_GITHUB_REPO }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN_VALUE }}
          EOF

      # ── 5. Decode keystore ─────────────────────────────────────────────────
      #
      # Base64-encode your release keystore and store it as:
      #   KEYSTORE_BASE64     — base64 of the .jks / .keystore file
      #   KEYSTORE_PASSWORD   — store password
      #   KEY_ALIAS           — key alias
      #   KEY_PASSWORD        — key password
      #
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      # ── 6. Build signed release APK ────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 7. Rename APK to include version tag ───────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"          # e.g. v1.2.0
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/clubeve-cc-${VERSION}.apk

      # ── 8. Create GitHub Release and upload APK (only on v* tags) ──────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ClubEve CC ${{ github.ref_name }}"
          generate_release_notes: true          # auto-generates changelog from commits
          files: app/build/outputs/apk/release/clubeve-cc-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
